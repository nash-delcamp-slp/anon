<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <!-- Robot antenna -->
  <rect x="293" y="44" width="14" height="40" rx="7" fill="#b9c2ca" stroke="#111" stroke-width="3"/>
  <circle cx="300" cy="34" r="15" fill="#b91c1c" stroke="#7f1d1d" stroke-width="3"/>
  <ellipse cx="300" cy="92" rx="24" ry="9" fill="#2e343b" stroke="#111" stroke-width="3"/>

  <!-- Head -->
  <ellipse cx="300" cy="158" rx="98" ry="78" fill="#b9c2ca" stroke="#111" stroke-width="5"/>
  <!-- Ears -->
  <ellipse cx="205" cy="155" rx="24" ry="34" fill="#6b7680" stroke="#111" stroke-width="4"/>
  <ellipse cx="395" cy="155" rx="24" ry="34" fill="#6b7680" stroke="#111" stroke-width="4"/>
  <!-- Ear lights -->
  <circle cx="194" cy="155" r="9" fill="#b91c1c"/>
  <circle cx="406" cy="155" r="9" fill="#b91c1c"/>
  <!-- Visor -->
  <rect x="214" y="133" width="172" height="48" rx="16" fill="#0d1115"/>
  <!-- Eyes -->
  <circle cx="258" cy="157" r="18" fill="#b8f0ff"/>
  <circle cx="342" cy="157" r="18" fill="#b8f0ff"/>
  <!-- Eye pupils (looking down at the newspaper) -->
  <circle cx="258" cy="163" r="7" fill="#e2fcff"/>
  <circle cx="342" cy="163" r="7" fill="#e2fcff"/>

  <!-- Shoulders -->
  <ellipse cx="230" cy="252" rx="56" ry="24" fill="#6f7881" opacity="0.35"/>
  <ellipse cx="370" cy="252" rx="56" ry="24" fill="#6f7881" opacity="0.35"/>

  <!-- Newspaper left page -->
  <path d="M150 214 L292 216 L292 432 L146 428 Z" fill="#f7f7f4" stroke="#111" stroke-width="4"/>
  <!-- Newspaper right page -->
  <path d="M308 216 L450 214 L454 428 L308 432 Z" fill="#fbfbf9" stroke="#111" stroke-width="4"/>
  <!-- Newspaper spine -->
  <rect x="292" y="216" width="16" height="216" fill="#dedede" stroke="#222" stroke-width="1.5"/>

  <!-- Left page: column headers -->
  <text x="162" y="248" font-family="monospace" font-size="13" font-weight="bold" fill="#444">id</text>
  <text x="195" y="248" font-family="monospace" font-size="13" font-weight="bold" fill="#444">name</text>
  <text x="242" y="248" font-family="monospace" font-size="13" font-weight="bold" fill="#444">age</text>
  <!-- Header underline -->
  <line x1="158" y1="252" x2="280" y2="252" stroke="#999" stroke-width="1"/>

  <!-- Left page: redacted data rows -->
  <g transform="translate(158,260)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="18" height="11" rx="2" fill="#121212"/>
    <rect x="28" y="0" width="52" height="11" rx="2" fill="#b91c1c"/>
    <rect x="86" y="0" width="22" height="11" rx="2" fill="#121212"/>
    <!-- Row 2 -->
    <rect x="0" y="16" width="26" height="11" rx="2" fill="#121212"/>
    <rect x="28" y="16" width="48" height="11" rx="2" fill="#121212"/>
    <rect x="86" y="16" width="28" height="11" rx="2" fill="#121212"/>
    <!-- Row 3 -->
    <rect x="0" y="32" width="18" height="11" rx="2" fill="#121212"/>
    <rect x="28" y="32" width="55" height="11" rx="2" fill="#b91c1c"/>
    <rect x="86" y="32" width="18" height="11" rx="2" fill="#b91c1c"/>
    <!-- Row 4 -->
    <rect x="0" y="48" width="22" height="11" rx="2" fill="#121212"/>
    <rect x="28" y="48" width="44" height="11" rx="2" fill="#121212"/>
    <rect x="86" y="48" width="24" height="11" rx="2" fill="#121212"/>
    <!-- Row 5 -->
    <rect x="0" y="64" width="14" height="11" rx="2" fill="#b91c1c"/>
    <rect x="28" y="64" width="52" height="11" rx="2" fill="#b91c1c"/>
    <rect x="86" y="64" width="28" height="11" rx="2" fill="#121212"/>
    <!-- Row 6 -->
    <rect x="0" y="80" width="26" height="11" rx="2" fill="#121212"/>
    <rect x="28" y="80" width="50" height="11" rx="2" fill="#121212"/>
    <rect x="86" y="80" width="18" height="11" rx="2" fill="#121212"/>
    <!-- Row 7 -->
    <rect x="0" y="96" width="18" height="11" rx="2" fill="#121212"/>
    <rect x="28" y="96" width="46" height="11" rx="2" fill="#b91c1c"/>
    <rect x="86" y="96" width="24" height="11" rx="2" fill="#121212"/>
    <!-- Row 8 -->
    <rect x="0" y="112" width="22" height="11" rx="2" fill="#121212"/>
    <rect x="28" y="112" width="55" height="11" rx="2" fill="#121212"/>
    <rect x="86" y="112" width="28" height="11" rx="2" fill="#121212"/>
    <!-- Row 9 -->
    <rect x="0" y="128" width="14" height="11" rx="2" fill="#121212"/>
    <rect x="28" y="128" width="42" height="11" rx="2" fill="#121212"/>
    <rect x="86" y="128" width="22" height="11" rx="2" fill="#b91c1c"/>
  </g>

  <!-- Right page: newspaper title -->
  <text x="380" y="242" font-family="monospace" font-size="34" font-weight="900" fill="#111" text-anchor="middle">anon</text>
  <line x1="322" y1="248" x2="440" y2="247" stroke="#111" stroke-width="2"/>

  <!-- Right page redaction bars (prose with paragraph structure) -->
  <g transform="translate(322,256)">
    <!-- Paragraph 1 -->
    <rect x="12" y="0" width="36" height="11" rx="2" fill="#121212"/>
    <rect x="54" y="0" width="68" height="11" rx="2" fill="#121212"/>
    <rect x="0" y="17" width="86" height="11" rx="2" fill="#b91c1c"/>
    <rect x="92" y="17" width="30" height="11" rx="2" fill="#121212"/>
    <rect x="0" y="34" width="58" height="11" rx="2" fill="#121212"/>
    <rect x="64" y="34" width="56" height="11" rx="2" fill="#121212"/>
    <rect x="0" y="51" width="78" height="11" rx="2" fill="#121212"/>
    <!-- Paragraph 2 -->
    <rect x="12" y="76" width="42" height="11" rx="2" fill="#121212"/>
    <rect x="60" y="76" width="62" height="11" rx="2" fill="#b91c1c"/>
    <rect x="0" y="93" width="72" height="11" rx="2" fill="#121212"/>
    <rect x="78" y="93" width="44" height="11" rx="2" fill="#121212"/>
    <rect x="0" y="110" width="98" height="11" rx="2" fill="#121212"/>
    <rect x="0" y="127" width="34" height="11" rx="2" fill="#b91c1c"/>
    <rect x="40" y="127" width="52" height="11" rx="2" fill="#121212"/>
    <rect x="0" y="144" width="66" height="11" rx="2" fill="#121212"/>
  </g>

  <!-- Left arm/hand -->
  <g transform="translate(140,320) rotate(-14)">
    <rect x="-20" y="-26" width="46" height="92" rx="20" fill="#6b7680" stroke="#111" stroke-width="4"/>
    <rect x="12" y="-38" width="24" height="18" rx="8" fill="#b9c2ca" stroke="#111" stroke-width="3"/>
    <rect x="12" y="-18" width="24" height="24" rx="8" fill="#b9c2ca" stroke="#111" stroke-width="3"/>
    <rect x="12" y="8" width="24" height="24" rx="8" fill="#b9c2ca" stroke="#111" stroke-width="3"/>
    <rect x="12" y="34" width="24" height="18" rx="8" fill="#b9c2ca" stroke="#111" stroke-width="3"/>
  </g>

  <!-- Right arm/hand -->
  <g transform="translate(460,320) rotate(14)">
    <rect x="-26" y="-26" width="46" height="92" rx="20" fill="#6b7680" stroke="#111" stroke-width="4"/>
    <rect x="-36" y="-38" width="24" height="18" rx="8" fill="#b9c2ca" stroke="#111" stroke-width="3"/>
    <rect x="-36" y="-18" width="24" height="24" rx="8" fill="#b9c2ca" stroke="#111" stroke-width="3"/>
    <rect x="-36" y="8" width="24" height="24" rx="8" fill="#b9c2ca" stroke="#111" stroke-width="3"/>
    <rect x="-36" y="34" width="24" height="18" rx="8" fill="#b9c2ca" stroke="#111" stroke-width="3"/>
  </g>
</svg>
