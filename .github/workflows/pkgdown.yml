# Workflow derived from https://github.com/r-lib/actions/tree/master/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install spacy cleannlp
          python -m spacy download en_core_web_sm

      - name: Configure Python for R
        run: |
          echo "RETICULATE_PYTHON=$(which python)" >> $GITHUB_ENV

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::bench, any::ggplot2, any::pkgdown, any::pkgload, local::.
          needs: website

      - name: Restore benchmark history
        shell: bash
        run: |
          mkdir -p bench/results
          git fetch origin gh-pages || true
          if git show origin/gh-pages:bench/history.csv > bench/results/history.csv.tmp 2>/dev/null; then
            mv bench/results/history.csv.tmp bench/results/history.csv
            echo "Restored benchmark history from gh-pages."
          else
            rm -f bench/results/history.csv.tmp bench/results/history.csv
            echo "No benchmark history found on gh-pages."
          fi

      - name: Run benchmarks
        env:
          BENCH_MACHINE: github-actions | ubuntu-latest
        run: |
          Rscript bench/record-results.R --history bench/results/history.csv --latest bench/results/latest.csv --iterations 3

      - name: Deploy package
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          Rscript -e 'pkgdown::deploy_to_branch(new_process = FALSE)'

      - name: Rebuild benchmark site
        shell: bash
        run: |
          if [ -f bench/results/history.csv ]; then
            Rscript bench/render-site.R --history bench/results/history.csv --site-dir bench/site
          else
            echo "No benchmark history to republish."
          fi

      - name: Publish benchmark site
        shell: bash
        run: |
          if [ ! -d bench/site ]; then
            echo "No benchmark site to publish."
            exit 0
          fi
          git fetch origin gh-pages
          tmp_dir="$(mktemp -d)"
          git worktree add -B gh-pages-bench "$tmp_dir" origin/gh-pages
          mkdir -p "$tmp_dir/bench"
          rsync -a --delete bench/site/ "$tmp_dir/bench/"
          cd "$tmp_dir"
          git add bench
          if git diff --cached --quiet -- bench; then
            echo "No benchmark site changes to publish."
            exit 0
          fi
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git commit -m "Update benchmark site"
          git push origin HEAD:gh-pages
